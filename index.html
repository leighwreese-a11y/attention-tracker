<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attention Tracker</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f766e" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Attention" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main>
    <h1>Attention Tracker</h1>

    <!-- 1. Tap a category to log where your attention is right now -->
    <section class="card">
      <h2>Where's your attention?</h2>
      <p class="hint">Tap to mark today. Tap again to undo. One mark per day.</p>
      <div id="grid" class="grid"></div>
    </section>

    <!-- 2. Rolling 14-day summary -->
    <section class="card">
      <h2>Last 14 days</h2>
      <p class="hint">Days each category got your attention. Older days drop off automatically.</p>
      <div id="summary"></div>
    </section>

    <!-- 3. Edit the 12 category names -->
    <section class="card">
      <button id="edit-toggle" class="secondary">Edit categories</button>
      <div id="edit-panel" class="edit-panel" hidden>
        <p class="hint">Rename any category, then tap Done.</p>
        <div id="edit-fields"></div>
        <button id="edit-done">Done</button>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
